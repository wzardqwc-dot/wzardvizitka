<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>w1zard - Business Card</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            position: relative;
            background: #000000;
            -webkit-tap-highlight-color: transparent;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 1;
        }
        
        /* ASCII Background - FULL SCREEN */
        #ascii-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 14px;
            color: rgba(255, 255, 255, 0.08);
            overflow: hidden;
            white-space: pre;
            pointer-events: none;
            letter-spacing: 2px;
        }
        
        /* Snow */
        #snow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
        }
        
        .snowflake {
            position: absolute;
            width: 2px;
            height: 18px;
            background: white;
            opacity: 0.8;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
            border-radius: 1px;
        }
        
        .container {
            position: relative;
            z-index: 3;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .card {
            background: rgba(20, 20, 25, 0.95);
            backdrop-filter: blur(40px);
            border-radius: 28px;
            padding: 45px 35px;
            text-align: center;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.8);
            max-width: 420px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeInUp 0.6s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .avatar-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 25px;
        }
        
        .halo {
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 20px;
            border-radius: 50%;
            background: transparent;
            border: 3px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 255, 255, 0.6), 0 0 30px rgba(255, 255, 255, 0.4), inset 0 0 10px rgba(255, 255, 255, 0.5);
            animation: haloGlow 2s ease-in-out infinite;
            z-index: 3;
        }
        
        @keyframes haloGlow {
            0%,
            100% {
                opacity: 0.8;
                box-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 255, 255, 0.6), 0 0 30px rgba(255, 255, 255, 0.4), inset 0 0 10px rgba(255, 255, 255, 0.5);
            }
            50% {
                opacity: 1;
                box-shadow: 0 0 15px rgba(255, 255, 255, 1), 0 0 30px rgba(255, 255, 255, 0.8), 0 0 45px rgba(255, 255, 255, 0.6), inset 0 0 15px rgba(255, 255, 255, 0.7);
            }
        }
        
        .avatar-ring {
            position: absolute;
            top: -2px;
            left: -2px;
            width: 134px;
            height: 134px;
            border-radius: 50%;
            background: #000000;
        }
        
        .avatar {
            position: relative;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #000000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            z-index: 1;
        }
        
        .username {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #000000 0%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .verified-badge {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }
        
        .bio {
            font-size: 22px;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 35px;
            line-height: 1.6;
        }
        
        .social-links {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .social-link {
            width: 58px;
            height: 58px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 26px;
            position: relative;
            overflow: hidden;
        }
        
        .social-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .social-link:hover::before {
            left: 100%;
        }
        
        .social-link:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }
        
        .social-link:active {
            transform: translateY(-2px);
        }
        
        .views {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 15px;
            margin-top: 25px;
            font-weight: 500;
        }
        
        @media (max-width: 480px) {
            .card {
                padding: 35px 25px;
            }
            .username {
                font-size: 32px;
            }
            .bio {
                font-size: 20px;
            }
            .social-link {
                width: 52px;
                height: 52px;
                font-size: 24px;
            }
            .avatar-container {
                width: 120px;
                height: 120px;
            }
            .avatar-ring {
                width: 124px;
                height: 124px;
            }
            .avatar {
                width: 120px;
                height: 120px;
            }
            .halo {
                top: -30px;
                width: 80px;
                height: 18px;
            }
            .verified-badge {
                width: 20px;
                height: 20px;
            }
            #ascii-bg {
                font-size: 11px;
                line-height: 11px;
            }
        }
    </style>
</head>

    <script>
        // Telegram WebApp initialization
        let tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            tg.ready();
            tg.setHeaderColor('#000000');
            tg.setBackgroundColor('#000000');
        }

        // ASCII Background Generator - FULL SCREEN
        const asciiChars = ['w', '1', 'z', 'a', 'r', 'd', '0', '1', '@', '#', '$', '%', '&', '*', '+', '=', '-', '~', '•', '°', '·', '∙'];
        const asciiBg = document.getElementById('ascii-bg');
        
        function generateASCII() {
            const cols = Math.floor(window.innerWidth / 14);
            const rows = Math.floor(window.innerHeight / 14);
            let content = '';
            
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    const randomChar = asciiChars[Math.floor(Math.random() * asciiChars.length)];
                    content += randomChar + ' ';
                }
                content += '\n';
            }
            
            asciiBg.textContent = content;
        }
        
        // Generate ASCII on load
        generateASCII();
        
        // Regenerate ASCII periodically with smooth animation
        setInterval(() => {
            asciiBg.style.transition = 'opacity 1s ease';
            asciiBg.style.opacity = '0';
            setTimeout(() => {
                generateASCII();
                asciiBg.style.opacity = '1';
            }, 1000);
        }, 10000);
        
        // Regenerate on resize
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(generateASCII, 200);
        });

        // Snow effect
        const snowContainer = document.getElementById("snow");
        let mouseX = window.innerWidth / 2;

        document.addEventListener("mousemove", (e) => {
            mouseX = e.clientX;
        });

        // Touch support for mobile
        document.addEventListener("touchmove", (e) => {
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
            }
        }, {
            passive: true
        });

        function createSnowflake() {
            const flake = document.createElement("div");
            flake.classList.add("snowflake");

            let startX = Math.random() * window.innerWidth;
            let y = -20;
            let speedY = Math.random() * 2 + 2;
            let drift = 0;

            flake.style.left = startX + "px";
            flake.style.top = y + "px";

            snowContainer.appendChild(flake);

            function animate() {
                y += speedY;

                let direction = (mouseX - window.innerWidth / 2) / (window.innerWidth / 2);
                drift += direction * 0.6;

                flake.style.transform = "translateX(" + drift + "px)";
                flake.style.top = y + "px";

                if (y < window.innerHeight) {
                    requestAnimationFrame(animate);
                } else {
                    flake.remove();
                }
            }

            animate();
        }

        // Start snow animation
        setInterval(createSnowflake, 80);

        // View counter
        const viewCount = document.getElementById('viewCount');
        let views = parseInt(localStorage.getItem('views') || '5');
        viewCount.textContent = views;

        function incrementViews() {
            views++;
            viewCount.textContent = views;
            localStorage.setItem('views', views.toString());
        }

        // Increment views on load
        setTimeout(incrementViews, 2000);
        setInterval(incrementViews, 30000);

        console.log('✨ w1zard Enhanced Business Card - Full ASCII Background!');
    </script>
